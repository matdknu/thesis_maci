project:
  type: book
  output-dir: ../../docs
  # Tras `quarto render`, versionar también docs/site_libs/ (Bootstrap, quarto-*.js/css).
  # Si no está en el repo, GitHub Pages sirve el HTML sin estilos (404 en site_libs/bootstrap/...).
  # Copia explícita a docs/ para GitHub Pages (fig_thesis + images: rutas relativas estables)
  resources:
    - fig_thesis
    - images
    - ../../outputs_modelado/umap_interactivo_temas.html
    - ../../outputs_modelado/umap_interactivo_sentimiento.html

# URL pública (enlaces canónicos, Open Graph, rutas en GitHub Pages)
website:
  site-url: https://matdknu.github.io/thesis_maci/

bibliography:
  - bibliography.bib
  - ../../bibliografia/bittex.bib

book:
  # Nota: título, subtítulo y autor se definen solo para HTML
  # Para PDF se usa la portada personalizada en portada.tex
  
  # Metadatos
  description: |
    Tesis para optar al grado de Magíster en Ciencia de Datos.
  
  favicon: fig_thesis/logo_udec.png
  
  # Estructura del libro
  chapters:
    - index.qmd
    - 01-introduccion.qmd
    - 02-presentacion-problema.qmd
    - 03-marco.qmd
    - 04-diseno.qmd
    - 05-depuracion-datos.qmd
    - 06-exploracion-datos.qmd
    - 07-modelado-datos.qmd
    - 08-interpretacion-resultados.qmd
    - 09-conclusion.qmd
    - 10-anexo-tablas.qmd
    - 11-anexo-prompts.qmd
    - references.qmd
  
  # Configuración del libro
  language: es
  sidebar:
    style: docked
  repo-url: https://github.com/matdknu/thesis_maci
  repo-actions: [source, issue]
  downloads: [pdf]

# ============================================================================
# FORMATO HTML
# ============================================================================
format:
  html:
    title: "Derecha fragmentada y un enemigo compartido"
    subtitle: "Anotación LLM dual y polarización discursiva en Reddit durante las elecciones chilenas de 2025"
    author: "Matías Javier Deneken Uribe"
    language: es
    lang: es
    # Citas: locale es-ES (p. ej. «y» entre autores) y formato autor-fecha (Autor, año)
    csl: csl/apa.csl
    theme: cosmo
    css: custom.css
    page-layout: article
    grid:
      sidebar-width: 280px
      margin-width: 0px
    sidebar:
      pinned: true
      collapse-level: 1
    toc: true
    toc-location: right
    toc-depth: 3
    toc-title: "Contenido"
    number-sections: true
    number-depth: 2
    smooth-scroll: true
    code-fold: false
    code-tools: false
    code-copy: false
    fig-width: 8
    fig-height: 5
    fig-dpi: 150
    fig-align: center

# ============================================================================
# FORMATO PDF
# ============================================================================
  pdf:
    # Portada antes del índice y de Agradecimientos (si va en index.qmd, Pandoc
    # puede emitir \\chapter*{Agradecimientos} antes del bloque {=latex}).
    include-before-body: portada_pdf.tex
    keep-tex: true
    # Evita que Quarto ejecute tlmgr automáticamente durante el render.
    # Esto previene fallos intermitentes donde no se genera index.log.
    latex-auto-install: false
    # Listas de figuras/tablas: varias pasadas para poblar .lof/.lot desde el .aux
    latex-min-runs: 4
    latex-max-runs: 10
    language: es
    lang: es
    csl: csl/apa.csl
    documentclass: scrreprt
    classoption: 
      - fontsize=11pt
      - DIV=12
      - titlepage=false
    
    # Geometría de página
    geometry:
      - top=30mm
      - bottom=30mm
      - left=25mm
      - right=25mm
    
    # Tabla de contenidos (cuerpo en index.qmd); solo capítulos (#), sin secciones
    toc: false
    toc-depth: 1
    toc-title: "Índice General"
    # Panel lateral / marcadores del PDF: mismo criterio (solo capítulos)
    hyperrefoptions:
      - bookmarksdepth=0
    lof: false
    lot: false
    
    # Numeración
    number-sections: true
    number-depth: 3
    
    # Enlaces
    colorlinks: true
    linkcolor: "Blue"
    urlcolor: "Blue"
    citecolor: "Blue"
    
    # Figuras
    fig-width: 7
    fig-height: 5
    fig-dpi: 300
    fig-pos: "H"
    
    # Fuente y espaciado (1,35 ≈ un tercio más que sencillo; antes 1,5)
    linestretch: 1.25
    
    # Cabecera LaTeX
    include-in-header:
      text: |
        % Compatibilidad caption/listings/etc. con KOMA (evita listas vacías o captions rotos)
        \usepackage{scrhack}
        \usepackage{etoolbox}
        \usepackage{booktabs}
        \usepackage{longtable}
        \usepackage{array}
        \usepackage{float}
        \usepackage{colortbl}
        \usepackage{xcolor}
        \usepackage{caption}
        \usepackage{fancyhdr}
        \captionsetup{font=small,labelfont=bf,skip=8pt,list=yes}
        \renewcommand{\arraystretch}{1.2}
        
        % Configuración de encabezados
        \pagestyle{fancy}
        \fancyhf{}
        \fancyhead[LE,RO]{\thepage}
        \fancyhead[LO]{\nouppercase{\leftmark}}
        \fancyhead[RE]{\nouppercase{\rightmark}}
        \renewcommand{\headrulewidth}{0.4pt}
        
        % Pandoc inyecta otro \AtBeginDocument que vuelve a poner nombres en inglés;
        % este hook corre al final de begin document y deja los títulos en español.
        \AddToHook{begindocument/end}{%
          \renewcommand{\contentsname}{Índice General}%
          \renewcommand{\listfigurename}{Índice de Figuras}%
          \renewcommand{\listtablename}{Índice de Tablas}%
          \captionsetup{list=yes}%
        }
        % Redefinir \citeproc de Pandoc para colorear citas en azul.
        % Pandoc renderiza citas como \citeproc{key}{texto visible};
        % hyperref/citecolor no las alcanza, hay que colorear el texto directamente.
        \AtBeginDocument{%
          \pagenumbering{roman}
          \pagestyle{plain}
          \hypersetup{citecolor=Blue, linkcolor=Blue, urlcolor=Blue}
          \let\OldCiteproc\citeproc
          \renewcommand{\citeproc}[2]{\textcolor{Blue}{\OldCiteproc{#1}{#2}}}%
        }
        
        % Configuración para numeración continua de capítulos (las partes no cuentan)
        \makeatletter
        % Evita que los capítulos fuercen salto de página (KOMA + Pandoc).
        \patchcmd{\chapter}{\if@openright\cleardoublepage\else\clearpage\fi}{}{}{}
        \patchcmd{\scr@startchapter}{\if@openright\cleardoublepage\else\clearpage\fi}{}{}{}
        % Deja 1 cm antes de cada capítulo para evitar traslapes.
        \RedeclareSectionCommand[beforeskip=1cm]{chapter}
        % Ocultar numeración de partes
        \renewcommand{\thepart}{}
        % Remover el reset automático de capítulos por parte para numeración continua
        \@removefromreset{chapter}{part}
        % Hacer que las secciones se numeren basándose en el capítulo, no en la parte
        \@removefromreset{section}{part}
        % Asegurar que las secciones se numeren dentro de cada capítulo
        \renewcommand{\thesection}{\thechapter.\arabic{section}}
        \makeatother
        
        % Configuración para evitar saltos de página innecesarios
        \clubpenalty=10000
        \widowpenalty=10000
        \displaywidowpenalty=10000
        
        % Mantener inicio de capítulo sin desplazamiento negativo (evita traslapes).
        \makeatletter
        \@ifundefined{chapter}{}{%
          \renewcommand*{\chapterheadstartvskip}{\vspace*{0pt}}%
        }
        \makeatother

# ============================================================================
# CONFIGURACIÓN DE EJECUCIÓN
# ============================================================================
execute: 
  echo: false
  warning: false
  message: false
  error: false
  cache: true
  freeze: auto

editor: visual

language:
  es:
    section-title-chapter: "Capítulo"
